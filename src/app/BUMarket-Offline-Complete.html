                                                    onChange={handleChange}
                                                    className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none"
                                                    placeholder="Enter your full name"
                                                    required
                                                />
                                            </div>

                                            <div>
                                                <label htmlFor="studentId" className="block text-sm text-gray-700 mb-2 font-medium">
                                                    Student ID *
                                                </label>
                                                <input
                                                    id="studentId"
                                                    name="studentId"
                                                    type="text"
                                                    value={formData.studentId}
                                                    onChange={handleChange}
                                                    className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none"
                                                    placeholder="e.g., 2024-12345"
                                                    required
                                                />
                                            </div>
                                        </div>

                                        <div>
                                            <label htmlFor="email" className="block text-sm text-gray-700 mb-2 font-medium">
                                                University Email *
                                            </label>
                                            <input
                                                id="email"
                                                name="email"
                                                type="email"
                                                value={formData.email}
                                                onChange={handleChange}
                                                className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none"
                                                placeholder="your.name@university.edu"
                                                required
                                            />
                                        </div>

                                        <div className="grid md:grid-cols-2 gap-4">
                                            <div>
                                                <label htmlFor="password" className="block text-sm text-gray-700 mb-2 font-medium">
                                                    Password *
                                                </label>
                                                <input
                                                    id="password"
                                                    name="password"
                                                    type="password"
                                                    value={formData.password}
                                                    onChange={handleChange}
                                                    className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none"
                                                    placeholder="Create a password"
                                                    required
                                                />
                                            </div>

                                            <div>
                                                <label htmlFor="confirmPassword" className="block text-sm text-gray-700 mb-2 font-medium">
                                                    Confirm Password *
                                                </label>
                                                <input
                                                    id="confirmPassword"
                                                    name="confirmPassword"
                                                    type="password"
                                                    value={formData.confirmPassword}
                                                    onChange={handleChange}
                                                    className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none"
                                                    placeholder="Confirm your password"
                                                    required
                                                />
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="pt-6 border-t border-gray-200">
                                    <h3 className="text-gray-800 mb-4 font-bold">Business Information</h3>
                                    <div className="space-y-4">
                                        <div className="grid md:grid-cols-2 gap-4">
                                            <div>
                                                <label htmlFor="businessName" className="block text-sm text-gray-700 mb-2 font-medium">
                                                    Business Name *
                                                </label>
                                                <input
                                                    id="businessName"
                                                    name="businessName"
                                                    type="text"
                                                    value={formData.businessName}
                                                    onChange={handleChange}
                                                    className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none"
                                                    placeholder="Your business name"
                                                    required
                                                />
                                            </div>

                                            <div>
                                                <label htmlFor="businessCategory" className="block text-sm text-gray-700 mb-2 font-medium">
                                                    Business Category *
                                                </label>
                                                <select
                                                    id="businessCategory"
                                                    name="businessCategory"
                                                    value={formData.businessCategory}
                                                    onChange={handleChange}
                                                    className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none"
                                                    required
                                                >
                                                    <option value="">Select Category</option>
                                                    <option value="food">Food & Snacks</option>
                                                    <option value="academic">Academic Materials</option>
                                                    <option value="apparel">Apparel</option>
                                                    <option value="services">Services</option>
                                                    <option value="electronics">Electronics</option>
                                                </select>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-blue-50 p-4 rounded-lg">
                                    <label className="flex items-start gap-3 cursor-pointer">
                                        <input
                                            type="checkbox"
                                            required
                                            className="mt-1 w-4 h-4 text-blue-600 rounded focus:ring-2 focus:ring-blue-500"
                                        />
                                        <span className="text-sm text-gray-700">
                                            I agree to the Terms of Service, Seller Agreement, and Privacy Policy. I confirm that I am 
                                            a verified student and will comply with all marketplace policies and guidelines.
                                        </span>
                                    </label>
                                </div>

                                <button
                                    type="submit"
                                    className="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 transition-colors font-medium"
                                >
                                    Create Seller Account
                                </button>
                            </form>

                            <div className="mt-6 pt-6 border-t border-gray-200">
                                <p className="text-xs text-gray-500 text-center">
                                    Your application will be reviewed within 24-48 hours. You will receive an email notification 
                                    once your account is verified and approved.
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // Main App Component
        function App() {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [userType, setUserType] = useState(null);
            const [userName, setUserName] = useState('');
            const [currentView, setCurrentView] = useState('login');

            const handleLogin = (type, name) => {
                setUserType(type);
                setUserName(name);
                setIsLoggedIn(true);
            };

            const handleSignUp = (type, name) => {
                setUserType(type);
                setUserName(name);
                setIsLoggedIn(true);
            };

            const handleLogout = () => {
                setIsLoggedIn(false);
                setUserType(null);
                setUserName('');
                setCurrentView('login');
            };

            const handleGoToSignUp = (type) => {
                setCurrentView(type === 'buyer' ? 'signupBuyer' : 'signupSeller');
            };

            const handleBackToLogin = () => {
                setCurrentView('login');
            };

            if (!isLoggedIn) {
                if (currentView === 'signupBuyer') {
                    return (
                        <SignUpPageBuyer 
                            onSignUp={(name) => handleSignUp('buyer', name)} 
                            onBackToLogin={handleBackToLogin}
                        />
                    );
                }
                
                if (currentView === 'signupSeller') {
                    return (
                        <SignUpPageSeller 
                            onSignUp={(name) => handleSignUp('seller', name)} 
                            onBackToLogin={handleBackToLogin}
                        />
                    );
                }

                return <LoginPage onLogin={handleLogin} onGoToSignUp={handleGoToSignUp} />;
            }

            if (userType === 'seller') {
                return <SellerDashboard userName={userName} onLogout={handleLogout} />;
            }

            return <Dashboard userName={userName} userType={userType} onLogout={handleLogout} />;
        }

        // Render the app
        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
